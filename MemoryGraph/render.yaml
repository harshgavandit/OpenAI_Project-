# Render Blueprint — MemoryGraph API (free tier + persistent disk)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: memorygraph-api
    runtime: docker
    dockerfilePath: ./MemoryGraph/backend/Dockerfile
    dockerContext: ./MemoryGraph/backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: fallback
      - key: DATABASE_URL
        value: sqlite:///./data/memorygraph.db
      - key: CHROMA_DB_PATH
        value: ./data/chromadb
      - key: COOKIE_SECURE
        value: "true"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "10080"
    disk:
      name: memorygraph-data
      mountPath: /app/data
      sizeGB: 1
